version: 2.1

parameters:
  run_monthly_testing:
    type: boolean
    default: false

executors:
  linux:
    machine:
      image: ubuntu-2204:current
    environment:
      RUNNER_OS: linux
    resource_class: large
  macos-arm:
    macos:
      xcode: 16.4.0
    environment:
      RUNNER_OS: macos
    resource_class: m4pro.medium

jobs:
  r-build:
    parameters:
      os:
        type: executor
      r-version:
        type: string
    executor: << parameters.os >>
    environment:
      ITK_GLOBAL_DEFAULT_NUMBER_OF_THREADS: 2
    steps:
      - checkout
      - run:
          name: Set environment
          command: |
            echo "export R_LIBS=$HOME/Rlibs" >> $BASH_ENV
      - run:
          name: Install R << parameters.r-version >>
          command: |
            R_VERSION="<< parameters.r-version >>"
            # Install rig, R Installation Manager (https://github.com/r-lib/rig) to control installed R version
            if [ "$RUNNER_OS" == "macos" ]; then
              # Install specific version of rig (0.8.0) directly from GitHub releases
              curl -L -o /tmp/rig.pkg https://github.com/r-lib/rig/releases/download/v0.8.0/rig-0.8.0-macOS-arm64.pkg
              ls -lh /tmp/rig.pkg  # Verify file exists and has reasonable size
              sudo installer -pkg /tmp/rig.pkg -target /
              rig add $R_VERSION
              # on macOS the R package is installed into a MAJOR.MINOR directory
              # the PATCH is ignored (only one patch version supported) the
              # architecture is added as a suffix (arm64, x86_64) to allow for
              # installations to coexist
              # Starting from R 4.6.0, rig no longer appends the architecture suffix
              R_MAJOR_MINOR="${R_VERSION%.*}"
              if [ "$(printf '%s\n' "4.6" "$R_MAJOR_MINOR" | sort -V | head -n1)" = "4.6" ]; then
                rig default "$R_MAJOR_MINOR"
              else
                rig default "${R_MAJOR_MINOR}-arm64"
              fi
            elif [ "$RUNNER_OS" == "linux" ]; then
              `which sudo` curl -L https://rig.r-pkg.org/deb/rig.gpg -o /etc/apt/trusted.gpg.d/rig.gpg
              `which sudo` sh -c 'echo "deb http://rig.r-pkg.org/deb rig main" > /etc/apt/sources.list.d/rig.list'
              `which sudo` apt update
              `which sudo` apt install r-rig
              sudo rig add $R_VERSION
              sudo rig default $R_VERSION
            fi
      - run:
          name: System Dependencies
          command: |
            if [ "$RUNNER_OS" == "linux" ]; then
              sudo apt-get -y update
              sudo apt-get install -y cmake libcurl4-openssl-dev libssh2-1-dev libharfbuzz-dev libfribidi-dev gh
              sudo rm -rf /var/lib/apt/lists/*
            elif [ "$RUNNER_OS" == "macos" ]; then
              brew install cmake
            fi
      - run:
          name: Configuration Information
          command: |
            mkdir -p ${R_LIBS}
            c++ --version
            cmake --version || echo "cmake not found"
            which R
            R --version
      - run:
          name: Install R packages
          command: |
            R -e "install.packages(c('remotes'), lib=c('${R_LIBS}'), repo='https://cloud.r-project.org/')"
      - run:
          name: Build and test
          no_output_timeout: 30m
          command: |
            set -x
            R -e "Sys.setenv(MAKEJ=3); remotes::install_git(c('.'), lib=c('${R_LIBS}'), upgrade='never', INSTALL_opts='--build')"
            R -e "library(SimpleITK); Version()"
      - run:
          name: Rename package
          command: |
            # package naming is SimpleITK_${PKG_VERSION}_R${R_VERSION_SHORT}_${OS_ARCHIVE_EXT}
            R_VERSION_SHORT=$(echo "<< parameters.r-version >>" | cut -d'.' -f1,2)
            PKG_VERSION=$(Rscript -e "cat(read.dcf('DESCRIPTION', 'Version')[1])")

            # canonical approach to collecting build artifacts in a directory for upload
            mkdir -p artifacts

            # Find the built package and rename according to the naming convention
            BUILT_PKG=$(ls SimpleITK_*.tgz | head -1)
            PKG_NAME="SimpleITK_${PKG_VERSION}_R${R_VERSION_SHORT}_macos-arm64.tgz"
            mv "$BUILT_PKG" "artifacts/$PKG_NAME"

            ls -lh artifacts/
      - store_artifacts:
          path: artifacts
          destination: .
workflows:
  r-build-test:
    # Runs on: push to main, pull requests to main, manual trigger, and scheduled runs
    jobs:
      - r-build:
          matrix:
            parameters:
              # Build against oldest patch versions x.y.0 as R is forward
              # compatible.
              r-version: ['4.4.0', '4.5.0', '4.6.0']
              os: ["macos-arm"]
          filters:
            branches:
              only:
                - main
                - /pull\/.*/  # Run on all pull request branches
